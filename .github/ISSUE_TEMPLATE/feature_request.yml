name: Feature request
description: Suggest a focused improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the smallest useful change.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Web console
        - Vision pipeline
        - Safety rules
        - Edge sync
        - Documentation
        - Deployment
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation notes
      description: What tests, sample data, or documentation would prove this works?
